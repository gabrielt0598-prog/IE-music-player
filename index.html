<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GESTURE INSTRUMENT // BALL DROP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }

    #split-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Shared webcam — hidden, consumed by both sides */
    #shared-webcam {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 320px;
      height: 240px;
    }

    /* ── Divider ─────────────────────────────────────────────────────── */
    #divider {
      width: 1px;
      height: 100vh;
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
      z-index: 500;
    }

    /* ══════════════ LEFT PANE — Gesture Instrument ══════════════ */
    #left-pane {
      position: relative;
      width: calc(50vw - 1px);
      height: 100vh;
      overflow: hidden;
    }

    #gesture-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ctrl-btn {
      position: absolute;
      left: 18px;
      background: rgba(0,0,0,0.85);
      border: 2.5px solid #fff;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1.5px;
      padding: 9px 16px;
      cursor: pointer;
      z-index: 10;
      text-transform: uppercase;
      user-select: none;
    }
    .ctrl-btn:hover { background: rgba(40,40,40,0.95); }
    #mute-btn { top: 18px; }
    #load-btn { top: 58px; }
    #file-input { display: none; }

    #gesture-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.6);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      line-height: 1.8;
    }

    #pane-label-left {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      padding: 5px 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ══════════════ RIGHT PANE — Ball Drop ══════════════ */
    #right-pane {
      position: relative;
      width: 50vw;
      height: 100vh;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #start-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 90;
      pointer-events: none;
    }

    #cursor-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 110;
      pointer-events: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.9s ease;
    }

    #overlay.fade-out { opacity: 0; pointer-events: none; }

    #overlay::before, #overlay::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: rgba(255,255,255,0.22);
      border-style: solid;
    }
    #overlay::before { top: 24px; left: 24px;  border-width: 1.5px 0 0 1.5px; }
    #overlay::after  { top: 24px; right: 24px; border-width: 1.5px 1.5px 0 0; }

    .overlay-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      max-width: 400px;
      padding: 36px 28px;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
    }
    .overlay-inner::before, .overlay-inner::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: rgba(255,255,255,0.3);
      border-style: solid;
    }
    .overlay-inner::before { bottom: -1px; left: -1px;  border-width: 0 0 1.5px 1.5px; }
    .overlay-inner::after  { bottom: -1px; right: -1px; border-width: 0 1.5px 1.5px 0; }

    .overlay-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    #overlay h1 {
      color: rgba(255,255,255,0.92);
      font-size: clamp(1.3rem, 2.8vw, 2rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      font-weight: normal;
    }

    #overlay p {
      color: rgba(255,255,255,0.42);
      font-size: clamp(0.66rem, 1.3vw, 0.8rem);
      text-align: center;
      line-height: 1.9;
      letter-spacing: 0.06em;
    }

    #start-btn {
      margin-top: 8px;
      padding: 11px 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #start-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.9);
      color: #fff;
    }
    #start-btn:disabled { opacity: 0.4; cursor: default; }

    #hud {
      position: absolute;
      top: 112px;
      left: 26px;
      color: rgba(255,255,255,0.58);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-align: left;
      pointer-events: none;
      z-index: 10;
      line-height: 2.4;
    }

    #calib-flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      transition: opacity 0.15s ease;
    }
    #calib-flash.flash { opacity: 1; }

    #fps { display: none; }

    #pane-label-right {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      padding: 5px 0;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>

  <!-- Shared webcam: one stream, both sides read it -->
  <video id="shared-webcam" autoplay playsinline muted></video>

  <div id="split-container">

    <!-- ══ LEFT PANE: Gesture Instrument ══ -->
    <div id="left-pane">
      <span id="pane-label-left">Gesture Instrument</span>
      <canvas id="gesture-canvas"></canvas>
      <button id="mute-btn" class="ctrl-btn">MUTE</button>
      <button id="load-btn" class="ctrl-btn">LOAD FILE</button>
      <input  id="file-input" type="file" accept=".wav,.mp3,.ogg,.aiff">
      <div id="gesture-status">Loading model...</div>
    </div>

    <div id="divider"></div>

    <!-- ══ RIGHT PANE: Ball Drop ══ -->
    <div id="right-pane">
      <span id="pane-label-right">Ball Drop</span>
      <canvas id="game-canvas"></canvas>
      <canvas id="start-canvas"></canvas>

      <div id="overlay">
        <div class="overlay-inner">
          <span class="overlay-label">System Boot &nbsp;//&nbsp; v2.0</span>
          <h1>Ball&nbsp;Drop</h1>
          <p>Catch falling objects with your hands<br>
             to advance the sequence counter.<br>
             Pinch thumb + index to change sound.</p>
          <button id="start-btn">Initialise</button>
          <span class="overlay-label">Feed processed locally &mdash; no data transmitted</span>
        </div>
      </div>

      <div id="hud">
        <span>Pinch thumb + index to change sound &amp; color</span>
      </div>

      <canvas id="cursor-canvas"></canvas>
      <div id="calib-flash"></div>
      <div id="fps">-- fps</div>
    </div>

  </div>

  <!-- ── Global camera startup — runs once, shared by both sides ───────── -->
  <script>
    window.CAMERA_READY = (async () => {
      try {
        const video = document.getElementById('shared-webcam');
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });
        await video.play();
        return true;
      } catch (e) {
        console.warn('[Camera] Startup failed:', e.message);
        return false;
      }
    })();
  </script>

  <!-- Matter.js (Ball Drop physics) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- MediaPipe (shared detection pipeline) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
  <!-- Tone.js (Gesture Instrument audio) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js" crossorigin="anonymous"></script>

  <!-- Ball Drop modules -->
  <script src="physics.js"></script>
  <script src="vision.js"></script>
  <script src="render.js"></script>
  <script src="startscreen.js"></script>
  <script src="main.js"></script>

  <!-- ══ Gesture Instrument — left pane, self-contained IIFE ══ -->
  <script>
  (() => {
    const canvas    = document.getElementById('gesture-canvas');
    const ctx       = canvas.getContext('2d');
    const video     = document.getElementById('shared-webcam');
    const muteBtn   = document.getElementById('mute-btn');
    const loadBtn   = document.getElementById('load-btn');
    const fileInput = document.getElementById('file-input');
    const statusEl  = document.getElementById('gesture-status');

    // Thumb tip = 4; finger tips: index=8, middle=12, ring=16, pinky=20
    const PARAMS = [
      { label: 'Rate',      idx: 8,  color: '#FF3355' },
      { label: 'Pitch',     idx: 12, color: '#00DD88' },
      { label: 'Sharpness', idx: 16, color: '#3399FF' },
      { label: 'Space',     idx: 20, color: '#FFDD00' },
    ];
    const THUMB_IDX = 4;
    const DOT_R = 8;

    let muted     = false;
    let fistMuted = false;

    function setGain() {
      if (!toneGain) return;
      const target = (muted || fistMuted) ? 0 : 1;
      toneGain.gain.cancelScheduledValues(Tone.now());
      toneGain.gain.linearRampTo(target, 0.005);
    }

    function resize() {
      canvas.width  = Math.floor(window.innerWidth / 2);
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      setGain();
      muteBtn.textContent = muted ? 'UNMUTE' : 'MUTE';
    });

    loadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      await ensureTone();
      const url = URL.createObjectURL(file);
      await buildGrainPlayer(url);
    });

    // First click on left pane wakes AudioContext and attempts auto-load
    document.getElementById('left-pane').addEventListener('click', async () => {
      if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
        await Tone.start();
      }
      if (!audioReady) await initAudio();
    });

    // ── Audio graph ────────────────────────────────────────────────────────
    // GrainPlayer → freqShifter → pitchLPF → pitchHPF → chebyshev →
    // reverb → waveAnalyser → fftAnalyser → toneGain → Destination

    let grainPlayer  = null;
    let freqShifter  = null;
    let pitchLPF     = null;
    let pitchHPF     = null;
    let chebyshev    = null;
    let reverb       = null;
    let waveAnalyser = null;
    let fftAnalyser  = null;
    let toneGain     = null;
    let audioReady   = false;

    async function ensureTone() {
      if (Tone.context.state !== 'running') await Tone.start();
      if (!waveAnalyser) {
        waveAnalyser = new Tone.Analyser({ type: 'waveform', size: 2048, smoothing: 0 });
        fftAnalyser  = new Tone.Analyser({ type: 'fft',      size: 1024, smoothing: 0 });
        toneGain     = new Tone.Gain((muted || fistMuted) ? 0 : 1).toDestination();
        freqShifter  = new Tone.FrequencyShifter(0);
        pitchLPF     = new Tone.Filter({ frequency: 20000, type: 'lowpass',  rolloff: -12 });
        pitchHPF     = new Tone.Filter({ frequency: 10,    type: 'highpass', rolloff: -12 });
        chebyshev    = new Tone.Chebyshev({ order: 7, wet: 0 });
        reverb       = new Tone.Reverb({ decay: 2, wet: 0 });
        await reverb.ready;
        freqShifter.connect(pitchLPF);
        pitchLPF.connect(pitchHPF);
        pitchHPF.connect(chebyshev);
        chebyshev.connect(reverb);
        reverb.connect(waveAnalyser);
        waveAnalyser.connect(fftAnalyser);
        fftAnalyser.connect(toneGain);
      }
    }

    async function initAudio() {
      await ensureTone();
      if (!grainPlayer) {
        try {
          await buildGrainPlayer('assets/test.wav');
        } catch (e) {
          console.warn('auto-load failed — use LOAD FILE', e);
        }
      }
    }

    function buildGrainPlayer(source) {
      return new Promise((resolve, reject) => {
        if (grainPlayer) {
          try { grainPlayer.stop(); grainPlayer.disconnect(); grainPlayer.dispose(); } catch (_) {}
          grainPlayer = null;
          audioReady  = false;
        }
        grainPlayer = new Tone.GrainPlayer({
          url:       source,
          loop:      false,
          grainSize: 0.1,
          overlap:   0.05,
          onload: () => {
            grainPlayer.connect(freqShifter);
            audioReady = true;
            resolve();
          },
          onerror: e => reject(e),
        });
      });
    }

    function triggerSound() {
      if (!grainPlayer || !audioReady) return;
      grainPlayer.stop();
      grainPlayer.start();
    }

    // ── Hand scale: wrist(0) → middle MCP(9), palm-height normaliser ──────
    function handScale(landmarks) {
      const w = landmarks[0], m = landmarks[9];
      return Math.hypot(w.x - m.x, w.y - m.y) || 0.001;
    }

    // ── Rate (index finger) → 10–750 ms, exponential curve ───────────────
    const RATE_REL_MIN = 0.20;
    const RATE_REL_MAX = 2.20;
    const RATE_MS_MIN  = 10;
    const RATE_MS_MAX  = 750;
    const RATE_SILENCE_THRESHOLD = 0.93;

    let currentRateMs   = 500;
    let currentRateNorm = 0;
    let nextTriggerAt   = 0;
    let handDetected    = false;

    function updateRate(landmarks) {
      const scale = handScale(landmarks);
      const t = landmarks[THUMB_IDX], i = landmarks[8];
      const d = Math.hypot(t.x - i.x, t.y - i.y) / scale;
      currentRateNorm = Math.max(0, Math.min(1, (d - RATE_REL_MIN) / (RATE_REL_MAX - RATE_REL_MIN)));
      const r = RATE_MS_MIN * Math.pow(RATE_MS_MAX / RATE_MS_MIN, currentRateNorm);
      if (r < currentRateMs) nextTriggerAt = Math.min(nextTriggerAt, performance.now() + r);
      currentRateMs = r;
    }

    // ── Pitch (middle finger) → −3000 to +3000 Hz ────────────────────────
    const PITCH_REL_MIN = 0.20;
    const PITCH_REL_MAX = 2.30;

    let currentPitchHz = 0;

    function updatePitch(landmarks) {
      if (!freqShifter || !audioReady) return;
      const scale = handScale(landmarks);
      const t = landmarks[THUMB_IDX], m = landmarks[12];
      const d = Math.hypot(t.x - m.x, t.y - m.y) / scale;
      const norm = Math.max(0, Math.min(1, (d - PITCH_REL_MIN) / (PITCH_REL_MAX - PITCH_REL_MIN)));
      currentPitchHz = norm * 6000 - 3000;
      freqShifter.frequency.value = currentPitchHz;
      const tLow  = Math.min(1, Math.max(0, (currentPitchHz + 3000) / 3500));
      pitchLPF.frequency.value = 200 + (20000 - 200) * tLow;
      const tHigh = Math.min(1, Math.max(0, (currentPitchHz - 1000) / 2000));
      pitchHPF.frequency.value = 10 + (8000 - 10) * tHigh;
    }

    // ── Sharpness (ring finger) → Chebyshev wet 0–0.75 ──────────────────
    const CHEBY_REL_MIN = 0.15;
    const CHEBY_REL_MAX = 2.20;
    const CHEBY_WET_MAX = 0.75;

    let currentChebWet = 0;

    function updateChebyshev(landmarks) {
      if (!chebyshev) return;
      const scale = handScale(landmarks);
      const t = landmarks[THUMB_IDX], r = landmarks[16];
      const d = Math.hypot(t.x - r.x, t.y - r.y) / scale;
      currentChebWet = Math.max(0, Math.min(1, (d - CHEBY_REL_MIN) / (CHEBY_REL_MAX - CHEBY_REL_MIN))) * CHEBY_WET_MAX;
      chebyshev.wet.value = currentChebWet;
    }

    // ── Space (pinky) → Reverb wet 0–0.50, power³ curve ─────────────────
    const REVERB_REL_MIN = 0.15;
    const REVERB_REL_MAX = 2.20;
    const REVERB_WET_MAX = 0.50;

    let currentReverbWet = 0;

    function updateReverb(landmarks) {
      if (!reverb) return;
      const scale = handScale(landmarks);
      const t = landmarks[THUMB_IDX], p = landmarks[20];
      const d = Math.hypot(t.x - p.x, t.y - p.y) / scale;
      const norm = Math.max(0, Math.min(1, (d - REVERB_REL_MIN) / (REVERB_REL_MAX - REVERB_REL_MIN)));
      currentReverbWet = REVERB_WET_MAX * (norm * norm * norm);
      reverb.wet.value = currentReverbWet;
    }

    // ── Cover-fit: scale video to fill the left-pane canvas ──────────────
    function coverFit() {
      const cw = canvas.width, ch = canvas.height;
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return null;
      const scale = Math.max(cw / vw, ch / vh);
      const fw = vw * scale, fh = vh * scale;
      return { ox: (cw - fw) / 2, oy: (ch - fh) / 2, fw, fh, cw, ch };
    }

    function lmPx(lm, fit) {
      return {
        x: fit.cw - fit.ox - lm.x * fit.fw,
        y: fit.oy + lm.y * fit.fh,
      };
    }

    // ── Drawing ───────────────────────────────────────────────────────────
    function drawVideo(fit) {
      ctx.save();
      ctx.translate(fit.cw, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, fit.ox, fit.oy, fit.fw, fit.fh);
      ctx.restore();
    }

    function drawHand(landmarks, fit) {
      const thumb = lmPx(landmarks[THUMB_IDX], fit);

      PARAMS.forEach(p => {
        if (p.idx === 12) return;
        const tip = lmPx(landmarks[p.idx], fit);
        ctx.beginPath();
        ctx.moveTo(tip.x, tip.y);
        ctx.lineTo(thumb.x, thumb.y);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, DOT_R, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });

      const pitchP   = PARAMS.find(p => p.idx === 12);
      const pitchTip = lmPx(landmarks[12], fit);
      ctx.beginPath();
      ctx.moveTo(pitchTip.x, pitchTip.y);
      ctx.lineTo(thumb.x, thumb.y);
      ctx.strokeStyle = pitchP.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(pitchTip.x, pitchTip.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = pitchP.color;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(thumb.x, thumb.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = '#FFDD00';
      ctx.fill();

      ctx.font = 'bold 20px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      PARAMS.forEach(p => {
        const tip = lmPx(landmarks[p.idx], fit);
        // Place label directly above the fingertip dot, not at palm midpoint
        const mx = tip.x;
        const my = tip.y - DOT_R - 20;
        const hz   = Math.round(currentPitchHz);
        const text = (p.idx === 12)
          ? `Pitch ${hz > 0 ? '+' : ''}${hz} Hz`
          : (p.idx === 16)
          ? `Sharpness ${Math.round(currentChebWet * 100)}%`
          : (p.idx === 20)
          ? `Space ${Math.round(currentReverbWet * 100)}%`
          : p.label;
        const tw = ctx.measureText(text).width, pad = 8, bh = 28;
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(mx - tw/2 - pad, my - bh/2, tw + pad*2, bh);
        ctx.fillStyle = p.color;
        ctx.fillText(text, mx, my + 1);
      });
    }

    function drawWaveform() {
      const wh   = Math.floor(canvas.height * 0.10);
      const wy   = canvas.height - wh;
      const half = canvas.width / 2;

      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      ctx.fillRect(0, wy, canvas.width, wh);

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.moveTo(half, wy);
      ctx.lineTo(half, wy + wh);
      ctx.stroke();

      if (!waveAnalyser || !fftAnalyser) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.moveTo(0, wy + wh / 2);
        ctx.lineTo(canvas.width, wy + wh / 2);
        ctx.stroke();
        return;
      }

      // Left half: oscilloscope (waveform)
      const waveVals = waveAnalyser.getValue();
      ctx.save();
      ctx.beginPath(); ctx.rect(0, wy, half, wh); ctx.clip();
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.88)';
      ctx.lineWidth = 1.5;
      const wStep = half / (waveVals.length - 1);
      for (let i = 0; i < waveVals.length; i++) {
        const x = i * wStep;
        const y = wy + wh / 2 + waveVals[i] * (wh / 2) * 0.85;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();

      // Right half: FFT spectrum, log 20 Hz – 25 kHz
      const fftVals = fftAnalyser.getValue();
      const numBins = fftVals.length;
      const nyquist = Tone.context.sampleRate / 2;
      const logMin  = Math.log(20);
      const logMax  = Math.log(Math.min(25000, nyquist));

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.88)';
      ctx.lineWidth = 1.5;
      for (let px = 0; px < half; px++) {
        const freq = Math.exp(logMin + (px / (half - 1)) * (logMax - logMin));
        const bin  = Math.min(numBins - 1, Math.round(freq / nyquist * numBins));
        const amp  = Math.max(0, (fftVals[bin] + 80) / 80);
        const x    = half + px;
        const y    = wy + wh - amp * wh * 0.92;
        px === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // ── Fist: all 4 fingers curled closer to wrist than their MCP ────────
    function isFistClosed(landmarks) {
      const wrist = landmarks[0];
      const pairs = [
        { tip: 8,  mcp: 5  },
        { tip: 12, mcp: 9  },
        { tip: 16, mcp: 13 },
        { tip: 20, mcp: 17 },
      ];
      let curled = 0;
      for (const { tip, mcp } of pairs) {
        const tipD = Math.hypot(landmarks[tip].x - wrist.x, landmarks[tip].y - wrist.y);
        const mcpD = Math.hypot(landmarks[mcp].x - wrist.x, landmarks[mcp].y - wrist.y);
        if (tipD < mcpD) curled++;
      }
      return curled >= 4;
    }

    function onResults(results) {
      const fit = coverFit();
      if (!fit) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawVideo(fit);

      // Keep only hands in the left pane: x > 0.5 in raw MediaPipe coords
      // (right half of raw frame = left half of mirrored display = left pane)
      const paneHands = (results.multiHandLandmarks || [])
        .filter(hand => hand[0].x > 0.5)
        .slice(0, 1);
      handDetected = paneHands.length > 0;

      let anyFist = false;
      if (handDetected) {
        paneHands.forEach(hand => {
          if (isFistClosed(hand)) anyFist = true;
          drawHand(hand, fit);
          updateRate(hand);
          updatePitch(hand);
          updateChebyshev(hand);
          updateReverb(hand);
        });
      }

      if (anyFist !== fistMuted) {
        fistMuted = anyFist;
        setGain();
      }

      if (fistMuted) {
        ctx.save();
        ctx.font = 'bold 28px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const label = 'MUTED';
        const tw = ctx.measureText(label).width;
        const px = canvas.width / 2, py = 40;
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(px - tw / 2 - 14, py - 20, tw + 28, 40);
        ctx.fillStyle = '#FF3355';
        ctx.fillText(label, px, py);
        ctx.restore();
      }

      drawWaveform();
    }

    // ── MediaPipe Hands for the left pane ─────────────────────────────────
    const gestureHands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
    });
    gestureHands.setOptions({
      maxNumHands: 1, modelComplexity: 1,
      minDetectionConfidence: 0.5, minTrackingConfidence: 0.5,
    });
    gestureHands.onResults(onResults);

    async function startGestureInstrument() {
      try {
        await gestureHands.initialize();
        statusEl.textContent = '';
        // Reuse the globally started camera — no second getUserMedia call
        await window.CAMERA_READY;

        async function loop() {
          const now = performance.now();
          if (audioReady && Tone.context.state === 'running' && handDetected &&
              now >= nextTriggerAt && currentRateNorm < RATE_SILENCE_THRESHOLD) {
            triggerSound();
            nextTriggerAt = now + currentRateMs;
          }
          if (video.readyState >= 2) await gestureHands.send({ image: video });
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }

    startGestureInstrument();
  })();
  </script>

</body>
